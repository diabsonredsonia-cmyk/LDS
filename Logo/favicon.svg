<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
  <defs>
    <clipPath id="top"><rect x="0" y="0" width="32" height="16"/></clipPath>
    <clipPath id="bot"><rect x="0" y="16" width="32" height="16"/></clipPath>
  </defs>

  <!-- fond sombre arrondi -->
  <rect width="32" height="32" rx="6" fill="#0a0d14"/>

  <!-- S feu (haut) -->
  <text x="16" y="28" text-anchor="middle" font-size="28" font-weight="700"
    font-family="Georgia, serif" fill="#e84040" clip-path="url(#top)">S</text>

  <!-- S eau (bas) -->
  <text x="16" y="28" text-anchor="middle" font-size="28" font-weight="700"
    font-family="Georgia, serif" fill="#3a9fe8" clip-path="url(#bot)">S</text>

  <!-- ligne katana dorée -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#c9a84c" stroke-width="1" opacity="0.9"/>
</svg>
